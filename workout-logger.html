<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Workout Log 2026 — V2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f2f7;
  --surface: #ffffff;
  --surface2: #f2f2f7;
  --surface3: #e5e5ea;
  --border: #e0e0e5;
  --border2: #c8c8cd;
  --text: #000000;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --accent: #000;
  --accent-bg: #000;
  --accent-text: #fff;
  --green: #34c759;
  --red: #ff3b30;
  --blue: #007aff;
  --orange: #ff9500;
  --radius: 12px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; background: var(--bg); }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  min-height: -webkit-fill-available;
}

/* ── HEADER ── */
header {
  background: rgba(242,242,247,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 16px 20px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 700px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
header h1 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
  flex: 1;
}
.header-stats {
  display: flex;
  gap: 14px;
}
.stat-item {
  text-align: center;
}
.stat-val {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.stat-lbl {
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 1px;
}
.header-actions { display: flex; gap: 6px; }
.btn-hdr {
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-hdr:hover { background: rgba(0,0,0,0.85); color: var(--text); }

/* ── TABS ── */
.tabs {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  gap: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.2px;
  padding: 12px 16px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text3);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  white-space: nowrap;
  transition: all 0.15s;
}
.tab:hover { color: var(--text2); }
.tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }

/* ── MAIN ── */
.main { padding: 20px; max-width: 700px; margin: 0 auto; padding-bottom: 40px; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  margin-top: 24px;
}
.section-label:first-child { margin-top: 0; }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}
.card-row {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.card-row:last-child { border-bottom: none; }
.row-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  min-width: 80px;
}
.row-label.muted { color: var(--text2); font-weight: 400; font-size: 12px; }

/* ── INPUTS ── */
input[type=text], input[type=date], input[type=number], textarea, select {
  font-family: inherit;
  font-size: 14px;
  font-weight: 400;
  background: transparent;
  border: none;
  color: var(--text);
  outline: none;
  width: 100%;
  text-align: right;
  caret-color: var(--text);
}
input[type=date] { color-scheme: light; }
input::placeholder, textarea::placeholder { color: var(--text3); }
textarea {
  text-align: left;
  resize: none;
  width: 100%;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.6;
  min-height: 72px;
  background: var(--surface);
  border-radius: var(--radius);
  border: none;
  display: block;
}
select { cursor: pointer; }
select option { background: #fff; }

/* ── EXERCISE ROWS ── */
.ex-row {
  display: grid;
  grid-template-columns: 1fr 60px 52px 52px 32px;
  gap: 6px;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.15s ease;
}
.ex-row:last-child { border-bottom: none; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
.ex-row input {
  font-size: 13px;
  text-align: left;
  padding: 4px 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  border-radius: 0;
  color: var(--text);
  width: 100%;
}
.ex-row input:focus { border-bottom-color: var(--text2); }
.ex-row input:nth-child(2), .ex-row input:nth-child(3), .ex-row input:nth-child(4) { text-align: center; }
.ex-col-headers {
  display: grid;
  grid-template-columns: 1fr 60px 52px 52px 32px;
  gap: 6px;
  padding: 8px 16px 4px;
  border-bottom: 1px solid var(--border);
}
.ex-col-headers span {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text3);
  text-align: center;
}
.ex-col-headers span:first-child { text-align: left; }

.btn-del-ex {
  font-family: inherit;
  font-size: 16px;
  line-height: 1;
  width: 28px;
  height: 28px;
  background: var(--surface3);
  border: none;
  color: var(--text3);
  cursor: pointer;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: all 0.1s;
}
.btn-del-ex:hover { background: var(--red); color: white; }

.btn-add-ex {
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--blue);
  background: none;
  border: none;
  padding: 12px 16px;
  width: 100%;
  text-align: left;
  cursor: pointer;
  transition: opacity 0.1s;
}
.btn-add-ex:hover { opacity: 0.7; }

/* ── BUTTONS ── */
.btn-primary {
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.2px;
  background: var(--text);
  color: var(--bg);
  border: none;
  padding: 16px;
  width: 100%;
  border-radius: var(--radius);
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  margin-bottom: 10px;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { transform: scale(0.98); }

.btn-secondary {
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  background: var(--surface2);
  color: var(--text2);
  border: none;
  padding: 14px;
  width: 100%;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-secondary:hover { background: var(--surface3); color: var(--text); }

.btn-whoop {
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border2);
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-whoop:hover { background: var(--surface3); color: var(--text); }

/* ── HISTORY ── */
.history-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.ftag {
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text3);
  cursor: pointer;
  transition: all 0.1s;
}
.ftag:hover { color: var(--text2); border-color: var(--text3); }
.ftag.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.search-box {
  font-family: inherit;
  font-size: 13px;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  outline: none;
  width: 160px;
  transition: border-color 0.1s;
}
.search-box:focus { border-color: var(--text3); }
.search-box::placeholder { color: var(--text3); }

.session-card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 10px;
  transition: background 0.1s;
}
.sc-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}
.sc-header:hover { background: var(--surface2); }
.sc-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
}
.sc-info { flex: 1; min-width: 0; }
.sc-date { font-size: 13px; font-weight: 600; color: var(--text); }
.sc-type { font-size: 12px; color: var(--text2); margin-top: 1px; }
.sc-preview { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.sc-arrow { color: var(--text3); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
.sc-arrow.open { transform: rotate(90deg); }

.sc-body { display: none; border-top: 1px solid var(--border); }
.sc-body.open { display: block; }
.sc-body table { width: 100%; border-collapse: collapse; }
.sc-body th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); padding: 10px 16px 6px; text-align: left; }
.sc-body td { font-size: 13px; padding: 6px 16px; border-bottom: 1px solid var(--border); color: var(--text2); }
.sc-body td:first-child { color: var(--text); }
.sc-body td:nth-child(2), .sc-body td:nth-child(3), .sc-body td:nth-child(4) { text-align: center; }
.sc-cardio { font-size: 12px; color: var(--green); padding: 8px 16px; }
.sc-note { font-size: 13px; color: var(--text2); padding: 8px 16px 4px; font-style: italic; }
.sc-actions { padding: 10px 16px 14px; display: flex; gap: 8px; flex-wrap: wrap; }
.btn-sm {
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.1s;
}
.btn-sm:hover { background: var(--surface3); color: var(--text); }
.btn-sm.danger:hover { background: var(--red); border-color: var(--red); color: white; }
.btn-sm.whoop { color: var(--green); border-color: #1a3a1a; background: #0d1f0d; }
.btn-sm.whoop:hover { background: #152b15; }

/* ── TEMPLATES ── */
.tmpl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 32px; }
.tmpl-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: background 0.1s, transform 0.1s;
  border: 1px solid transparent;
}
.tmpl-card:hover { background: var(--surface2); transform: translateY(-1px); border-color: var(--border2); }
.tmpl-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.tmpl-tag { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
.tmpl-exercises { font-size: 11px; color: var(--text2); line-height: 1.8; }
.tmpl-use {
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  margin-top: 12px;
  display: block;
  width: 100%;
  padding: 8px;
  background: var(--surface3);
  border: none;
  border-radius: var(--radius-sm);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.1s;
  text-align: center;
}
.tmpl-use:hover { background: var(--text); color: var(--bg); }

/* ── TEMPLATE EDITOR ── */
.editor-section { margin-top: 8px; }
.editor-section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
  margin-bottom: 12px;
}
.tmpl-edit-card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 10px;
}
.tmpl-edit-head {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.tmpl-edit-head input[type=text] {
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  background: transparent;
  border: none;
  color: var(--text);
  outline: none;
  flex: 1;
  text-align: left;
}
.tmpl-edit-head input[type=text]:first-of-type { max-width: 30px; }
.tmpl-edit-head select {
  font-family: inherit;
  font-size: 11px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text2);
  padding: 4px 8px;
  border-radius: 6px;
  outline: none;
  cursor: pointer;
  text-align: left;
  width: auto;
}
.btn-del-tmpl {
  font-family: inherit;
  font-size: 14px;
  width: 26px; height: 26px;
  background: var(--surface3);
  border: none;
  color: var(--text3);
  cursor: pointer;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  padding: 0; transition: all 0.1s;
}
.btn-del-tmpl:hover { background: var(--red); color: white; }
.tmpl-edit-body { padding: 10px 14px; }
.tmpl-cardio-input {
  font-family: inherit;
  font-size: 12px;
  width: 100%;
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  outline: none;
  margin-bottom: 10px;
}
.tmpl-cardio-input:focus { border-color: var(--text3); color: var(--text); }
.tmpl-ex-edit-row {
  display: grid;
  grid-template-columns: 1fr 60px 52px 52px 28px;
  gap: 4px;
  margin-bottom: 5px;
  animation: fadeIn 0.12s ease;
}
.tmpl-ex-edit-row input {
  font-family: inherit;
  font-size: 12px;
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 8px;
  border-radius: 6px;
  outline: none;
  width: 100%;
  text-align: center;
}
.tmpl-ex-edit-row input:first-child { text-align: left; }
.tmpl-ex-edit-row input:focus { border-color: var(--text3); }
.btn-add-tmpl-ex {
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  color: var(--blue);
  background: none;
  border: none;
  padding: 8px 0;
  width: 100%;
  text-align: left;
  cursor: pointer;
  transition: opacity 0.1s;
  margin-top: 2px;
}
.btn-add-tmpl-ex:hover { opacity: 0.7; }
.editor-actions { display: flex; gap: 8px; margin-top: 14px; }
.btn-add-tmpl {
  font-family: inherit; font-size: 13px; font-weight: 500;
  background: var(--surface); color: var(--text2);
  border: 1px solid var(--border2);
  padding: 10px 16px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.1s;
}
.btn-add-tmpl:hover { background: var(--surface2); color: var(--text); }
.btn-save-tmpls {
  font-family: inherit; font-size: 13px; font-weight: 600;
  background: var(--text); color: var(--bg);
  border: none;
  padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; transition: opacity 0.1s;
  margin-left: auto;
}
.btn-save-tmpls:hover { opacity: 0.85; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--surface3);
  border: none;
  color: #fff;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  border-radius: 24px;
  z-index: 9999;
  opacity: 0;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
  white-space: nowrap;
  backdrop-filter: blur(20px);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 20px;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 420px;
}
.modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── EMPTY ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 13px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  header { padding: 12px 16px 10px; }
  .main { padding: 16px; }
  .tabs { padding: 0 16px; }
  .header-stats { display: none; }
  .sc-preview { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Workout Log <span style="font-weight:300;color:var(--text3);font-size:13px">2026</span></h1>
    <span style="font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.5px">V2.0</span>
    <div class="header-stats">
      <div class="stat-item"><div class="stat-val" id="hdr-count">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat-item"><div class="stat-val" id="hdr-week">0</div><div class="stat-lbl">Week</div></div>
      <div class="stat-item"><div class="stat-val" id="hdr-streak">0</div><div class="stat-lbl">Streak</div></div>
    </div>
    <div class="header-actions">
      <button class="btn-hdr" onclick="exportData()">Export</button>
      <label class="btn-hdr" style="cursor:pointer">Import
        <input type="file" accept=".json" style="display:none" onchange="importData(event)">
      </label>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('log')">Log</button>
  <button class="tab" onclick="showTab('history')">History</button>
  <button class="tab" onclick="showTab('templates')">Templates</button>
</div>

<!-- ═══ LOG TAB ═══ -->
<div id="tab-log" class="main" style="display:block">

  <div class="section-label">Session</div>
  <div class="card">
    <div class="card-row">
      <span class="row-label">Date</span>
      <input type="date" id="f-date">
    </div>
    <div class="card-row">
      <span class="row-label">Week</span>
      <input type="text" id="f-week" placeholder="W22">
    </div>
    <div class="card-row">
      <span class="row-label">Day</span>
      <input type="text" id="f-type" placeholder="e.g. Mon – Heavy Legs" list="day-suggestions">
      <datalist id="day-suggestions">
        <option value="Mon – Heavy Legs">
        <option value="Tue – Chest + Shoulders">
        <option value="Wed – Recovery">
        <option value="Thu – Lighter Legs">
        <option value="Fri – Light Upper">
        <option value="Sat – Back + Shoulders">
        <option value="Sun – Rest">
      </datalist>
    </div>
    <div class="card-row">
      <span class="row-label">Weight</span>
      <input type="number" id="f-bw" placeholder="—" step="0.1">
      <span style="color:var(--text3);font-size:12px;margin-left:4px">kg</span>
    </div>
    <div class="card-row" style="flex-direction:column;align-items:stretch;gap:4px">
      <span class="row-label muted">Cardio</span>
      <input type="text" id="f-cardio" placeholder="e.g. 20 min Zone 2 walk" style="text-align:left">
    </div>
  </div>

  <div class="section-label">Exercises</div>
  <div class="card" id="ex-card">
    <div class="ex-col-headers">
      <span>Exercise</span><span>kg</span><span>Reps</span><span>Sets</span><span></span>
    </div>
    <div id="ex-tbody"></div>
    <button class="btn-add-ex" onclick="addExRow()">+ Add Exercise</button>
  </div>

  <div class="section-label">Note</div>
  <textarea id="f-note" placeholder="How did it feel?"></textarea>

  <div style="margin-top:16px">
    <button class="btn-primary" onclick="saveSession()">Save Session</button>
    <button class="btn-secondary" onclick="clearForm()">Clear</button>
  </div>
</div>

<!-- ═══ HISTORY TAB ═══ -->
<div id="tab-history" class="main" style="display:none">
  <div class="history-toolbar">
    <div class="filter-chips">
      <button class="ftag active" data-filter="all" onclick="filterSessions(this)">All</button>
      <button class="ftag" data-filter="legs" onclick="filterSessions(this)">Legs</button>
      <button class="ftag" data-filter="chest" onclick="filterSessions(this)">Push</button>
      <button class="ftag" data-filter="back" onclick="filterSessions(this)">Pull</button>
      <button class="ftag" data-filter="recovery" onclick="filterSessions(this)">Recovery</button>
    </div>
    <input type="search" class="search-box" id="search-input" placeholder="Search…" oninput="renderHistory()">
  </div>
  <div id="sessions-list"></div>
</div>

<!-- ═══ TEMPLATES TAB ═══ -->
<div id="tab-templates" class="main" style="display:none">
  <div class="section-label">Tap to use</div>
  <div class="tmpl-grid" id="template-grid"></div>

  <div class="editor-section">
    <div class="editor-section-label">Edit Templates</div>
    <div id="tmpl-editor-list"></div>
    <div class="editor-actions">
      <button class="btn-add-tmpl" onclick="addNewTemplate()">+ New</button>
      <button class="btn-save-tmpls" onclick="saveTemplates()">Save Changes</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Confirm</h3>
    <p id="modal-msg">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn-sm danger" id="modal-confirm">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE      = 'workoutLog_2026';
const TMPL_STORE = 'workoutTemplates_2026';
let currentFilter = 'all';
let modalCallback = null;
let _editingTemplates = null;

// ── TEMPLATES ──
const DEFAULT_TEMPLATES = [
  {
    id: 'mon-heavy-legs',
    name: 'Mon – Heavy Legs',
    type: 'lower',
    icon: '🦵',
    cardio: '15–25 min | Zone 1, brief low Zone 2 | Easy walk or bike',
    exercises: [
      { name: 'Leg Press (S2)',           weight: '136', reps: '8',  sets: '3' },
      { name: 'RDL (DB)',                 weight: '55lb', reps: '8',  sets: '3' },
      { name: 'Calf Raise (Machine)',     weight: '54',  reps: '15', sets: '3' },
    ]
  },
  {
    id: 'tue-chest-shoulders',
    name: 'Tue – Chest + Shoulders',
    type: 'push',
    icon: '💪',
    cardio: '15–20 min | Zone 2, brief Zone 1 warm/cool | Easy Stairmaster, brisk walk, or light row',
    exercises: [
      { name: 'Incline / Machine Bench Press', weight: '70',  reps: '8',     sets: '3' },
      { name: 'Back-off Bench (optional)',      weight: '50',  reps: '10',    sets: '2' },
      { name: 'Shoulder Press',                weight: '',    reps: '10–12', sets: '3' },
      { name: 'Lateral Raise',                 weight: '',    reps: '10–12', sets: '3' },
    ]
  },
  {
    id: 'wed-recovery',
    name: 'Wed – Recovery',
    type: 'other',
    icon: '🧘',
    cardio: '25–30 min | Zone 1–low Zone 2 only | Easy walk or easy bike, no pushing',
    exercises: []
  },
  {
    id: 'thu-lighter-legs',
    name: 'Thu – Lighter Legs',
    type: 'lower',
    icon: '🦿',
    cardio: '10–15 min | Zone 1, maybe low Zone 2 | Short walk or light bike',
    exercises: [
      { name: 'Lunges / Split Squats',    weight: '',   reps: '8/leg', sets: '3' },
      { name: 'Hamstring RDL or Curl',    weight: '',   reps: '10',    sets: '3' },
      { name: 'Calf Raise (Machine)',     weight: '54', reps: '15',    sets: '3' },
    ]
  },
  {
    id: 'fri-upper-light',
    name: 'Fri – Light Upper / Movement',
    type: 'push',
    icon: '🏃',
    cardio: '20–25 min | Zone 2, some Zone 1 warm/cool | Stairmaster, rower, or brisk walk',
    exercises: [
      { name: 'Rows (easy pump)',   weight: '', reps: '12', sets: '3' },
      { name: 'Push-ups',          weight: 'BW', reps: '15', sets: '3' },
    ]
  },
  {
    id: 'sat-back-shoulders',
    name: 'Sat – Back + Shoulders',
    type: 'pull',
    icon: '🏋️',
    cardio: '5–10 min warm-up Zone 1–2 | If Recovery green: +10–15 min Zone 2 | Walk or Stairmaster',
    exercises: [
      { name: 'Lat Pulldown (Narrow)',  weight: '40', reps: '8–10', sets: '3' },
      { name: 'Seated Row',            weight: '40', reps: '8–10', sets: '3' },
      { name: 'Face Pulls / Rear Delt',weight: '27', reps: '15',   sets: '3' },
    ]
  },
  {
    id: 'sun-rest',
    name: 'Sun – Rest',
    type: 'other',
    icon: '😴',
    cardio: '15–20 min | Zone 1 only | Very easy walk or easy bike',
    exercises: []
  },
];

// ── STORAGE ──
function getData() { try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; } }
function saveData(d) { localStorage.setItem(STORE, JSON.stringify(d)); }

// ── TABS ──
function showTab(t) {
  ['log','history','templates'].forEach(id => {
    document.getElementById('tab-' + id).style.display = id === t ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['log','history','templates'][i] === t);
  });
  if (t === 'history') renderHistory();
  if (t === 'templates') renderTemplates();
}

// ── FORM ──
function initForm() {
  const d = new Date();
  document.getElementById('f-date').value = d.toISOString().split('T')[0];
  document.getElementById('f-week').value = 'W' + getWeekNum(d);
  document.getElementById('ex-tbody').innerHTML = '';
  addExRow(); addExRow(); addExRow();
}

function getWeekNum(date) {
  // ISO 8601 week number — week starts Monday
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dow = d.getUTCDay() === 0 ? 7 : d.getUTCDay(); // Mon=1 … Sun=7
  d.setUTCDate(d.getUTCDate() + 4 - dow);               // shift to Thursday of same week
  const jan4 = new Date(Date.UTC(d.getUTCFullYear(), 0, 4)); // Jan 4 is always in W1
  const jan4dow = jan4.getUTCDay() === 0 ? 7 : jan4.getUTCDay();
  const w1Monday = new Date(jan4); w1Monday.setUTCDate(jan4.getUTCDate() - (jan4dow - 1));
  return Math.ceil(((d - w1Monday) / 86400000 + 1) / 7);
}

function addExRow(ex) {
  const container = document.getElementById('ex-tbody');
  const div = document.createElement('div');
  div.className = 'ex-row';
  div.innerHTML = `
    <input type="text" placeholder="Exercise name" value="${ex?.name||''}" style="text-align:left">
    <input type="text" placeholder="—" value="${ex?.weight||''}">
    <input type="text" placeholder="—" value="${ex?.reps||''}">
    <input type="text" placeholder="—" value="${ex?.sets||''}">
    <button class="btn-del-ex" onclick="this.closest('.ex-row').remove()">−</button>
  `;
  container.appendChild(div);
}

function getExercises() {
  return Array.from(document.querySelectorAll('#ex-tbody .ex-row')).map(row => {
    const inputs = row.querySelectorAll('input');
    return { name: inputs[0].value.trim(), weight: inputs[1].value.trim(), reps: inputs[2].value.trim(), sets: inputs[3].value.trim() };
  }).filter(e => e.name);
}

function clearForm() {
  document.getElementById('f-bw').value = '';
  document.getElementById('f-cardio').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('f-type').value = '';
  document.getElementById('ex-tbody').innerHTML = '';
  addExRow(); addExRow(); addExRow();
}

function saveSession() {
  const date    = document.getElementById('f-date').value;
  const cardio  = document.getElementById('f-cardio').value.trim();
  const exercises = getExercises();
  if (!date) { toast('Please add a date'); return; }
  if (!exercises.length && !cardio) { toast('Add at least one exercise or cardio'); return; }

  const session = {
    id: Date.now(),
    date,
    week:       document.getElementById('f-week').value,
    type:       document.getElementById('f-type').value,
    bodyweight: document.getElementById('f-bw').value,
    cardio,
    exercises,
    note:       document.getElementById('f-note').value
  };
  const data = getData();
  data.unshift(session);
  saveData(data);
  updateHeaderStats();
  toast('Session saved');
  clearForm();
}

// ── HISTORY ──
function filterSessions(el) {
  document.querySelectorAll('.ftag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.filter;
  renderHistory();
}

function renderHistory() {
  const list   = document.getElementById('sessions-list');
  const search = (document.getElementById('search-input')?.value || '').toLowerCase();
  let data = getData();
  if (currentFilter !== 'all') data = data.filter(s => (s.type||'').toLowerCase().includes(currentFilter));
  if (search) data = data.filter(s =>
    (s.exercises||[]).some(e => e.name.toLowerCase().includes(search)) ||
    (s.note||'').toLowerCase().includes(search) ||
    (s.type||'').toLowerCase().includes(search) ||
    (s.cardio||'').toLowerCase().includes(search)
  );

  if (!data.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>No sessions yet.</p></div>`;
    return;
  }

  list.innerHTML = data.map(s => {
    const preview = (s.exercises||[]).slice(0,2).map(e=>e.name).join(' · ')
      || (s.cardio ? '🏃 Cardio' : '—');
    const rows = (s.exercises||[]).map(e =>
      `<tr><td>${e.name}</td><td>${e.weight||'—'}</td><td>${e.reps||'—'}</td><td>${e.sets||'—'}</td></tr>`
    ).join('');

    return `
    <div class="session-card" data-id="${s.id}">
      <div class="sc-header" onclick="toggleCard(this)">
        <div class="sc-dot"></div>
        <div class="sc-info">
          <div class="sc-date">${s.date} <span style="color:var(--text3);font-weight:400;font-size:11px">${s.week||''}</span></div>
          <div class="sc-type">${s.type||'Session'}${s.bodyweight?' · '+s.bodyweight+' kg':''}</div>
        </div>
        <div class="sc-preview">${preview}</div>
        <span class="sc-arrow">›</span>
      </div>
      <div class="sc-body">
        ${rows ? `<table><thead><tr><th>Exercise</th><th>kg</th><th>Reps</th><th>Sets</th></tr></thead><tbody>${rows}</tbody></table>` : ''}
        ${s.cardio ? `<div class="sc-cardio">🏃 ${s.cardio}</div>` : ''}
        ${s.note   ? `<div class="sc-note">${s.note}</div>` : ''}
        <div class="sc-actions">
          <button class="btn-sm whoop" onclick="copySessionForWhoop(${s.id})">⎘ Copy for WHOOP</button>
          <button class="btn-sm" onclick="loadSession(${s.id})">Load</button>
          <button class="btn-sm danger" onclick="deleteSession(${s.id})">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(el) {
  el.querySelector('.sc-arrow').classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function loadSession(id) {
  const s = getData().find(s => s.id === id);
  if (!s) return;
  document.getElementById('f-date').value = s.date;
  document.getElementById('f-week').value = s.week || '';
  document.getElementById('f-type').value = s.type || '';
  document.getElementById('f-bw').value   = s.bodyweight || '';
  document.getElementById('f-cardio').value = s.cardio || '';
  document.getElementById('f-note').value = s.note || '';
  document.getElementById('ex-tbody').innerHTML = '';
  (s.exercises||[]).forEach(e => addExRow(e));
  showTab('log');
  toast('Session loaded');
}

function deleteSession(id) {
  showModal('Delete Session', 'This cannot be undone.', () => {
    saveData(getData().filter(s => s.id !== id));
    updateHeaderStats();
    renderHistory();
    toast('Deleted');
  });
}

// ── COPY FOR WHOOP ──
function copySessionForWhoop(id) {
  const s = getData().find(s => s.id === id);
  if (!s) return;
  const lines = [];
  lines.push(`${s.week ? s.week + ' · ' : ''}${s.type || 'Session'} · ${s.date}`);
  if (s.bodyweight) lines.push(`BW: ${s.bodyweight} kg`);
  lines.push('');
  if ((s.exercises||[]).length) {
    lines.push('Strength:');
    s.exercises.forEach(e => {
      const parts = [e.weight, e.reps&&e.reps+' reps', e.sets&&e.sets+' sets'].filter(Boolean);
      lines.push(`  • ${e.name}${parts.length?' — '+parts.join(' × '):''}`);
    });
    lines.push('');
  }
  if (s.cardio) { lines.push('Cardio:'); lines.push(`  ${s.cardio}`); lines.push(''); }
  if (s.note) lines.push(`Note: ${s.note}`);

  const text = lines.join('\n').trim();
  navigator.clipboard.writeText(text).then(() => toast('Copied for WHOOP')).catch(() => {
    const ta = Object.assign(document.createElement('textarea'), { value: text, style: 'position:fixed;opacity:0' });
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    toast('Copied for WHOOP');
  });
}

// ── TEMPLATES ──
function getTemplates() {
  try {
    const s = JSON.parse(localStorage.getItem(TMPL_STORE));
    return s && s.length ? s : JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_TEMPLATES)); }
}

function renderTemplates() {
  const tmpls = getTemplates();
  const grid  = document.getElementById('template-grid');
  grid.innerHTML = tmpls.map(t => `
    <div class="tmpl-card" onclick="useTemplate('${t.id}')">
      <div class="tmpl-name">${t.name}</div>
      <div class="tmpl-tag">${t.type}</div>
      <div class="tmpl-exercises">${t.exercises.slice(0,3).map(e=>`· ${e.name}`).join('<br>')}</div>
      ${t.cardio?`<div style="font-size:11px;color:var(--green);margin-top:6px">🏃 ${t.cardio.split('|')[0].trim()}</div>`:''}
      <button class="tmpl-use" onclick="event.stopPropagation();useTemplate('${t.id}')">Use →</button>
    </div>`).join('');
  renderTemplateEditor(tmpls);
}

function useTemplate(id) {
  const t = getTemplates().find(t => t.id === id);
  if (!t) return;
  const typeMap = { lower:'Lower', push:'Push', pull:'Pull', meta:'Metabolic', other:'Other' };
  document.getElementById('f-type').value   = t.name || typeMap[t.type] || t.type;
  document.getElementById('f-cardio').value = t.cardio || '';
  document.getElementById('ex-tbody').innerHTML = '';
  t.exercises.forEach(e => addExRow(e));
  showTab('log');
  toast('Template loaded');
}

// ── TEMPLATE EDITOR ──
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderTemplateEditor(tmpls) {
  const list = document.getElementById('tmpl-editor-list');
  list.innerHTML = tmpls.map((t,ti) => `
    <div class="tmpl-edit-card">
      <div class="tmpl-edit-head">
<input type="text" value="${escH(t.name)}" placeholder="Name" oninput="_et(${ti},'name',this.value)">
        <select onchange="_et(${ti},'type',this.value)">
          ${['lower','push','pull','meta','other'].map(v=>`<option value="${v}"${t.type===v?' selected':''}>${v}</option>`).join('')}
        </select>
        <button class="btn-del-tmpl" onclick="deleteTmpl(${ti})">×</button>
      </div>
      <div class="tmpl-edit-body">
        <input class="tmpl-cardio-input" type="text" placeholder="Cardio" value="${escH(t.cardio||'')}" oninput="_et(${ti},'cardio',this.value)">
        <div id="et-exrows-${ti}">
          ${t.exercises.map((e,ei)=>tmplExRowHTML(ti,ei,e)).join('')}
        </div>
        <button class="btn-add-tmpl-ex" onclick="addTmplEx(${ti})">+ Add Exercise</button>
      </div>
    </div>`).join('');
}

function tmplExRowHTML(ti,ei,e) {
  return `<div class="tmpl-ex-edit-row" id="et-ex-${ti}-${ei}">
    <input type="text" value="${escH(e.name||'')}" placeholder="Exercise" style="text-align:left" oninput="_ete(${ti},${ei},'name',this.value)">
    <input type="text" value="${escH(e.weight||'')}" placeholder="kg" oninput="_ete(${ti},${ei},'weight',this.value)">
    <input type="text" value="${escH(e.reps||'')}" placeholder="reps" oninput="_ete(${ti},${ei},'reps',this.value)">
    <input type="text" value="${escH(e.sets||'')}" placeholder="sets" oninput="_ete(${ti},${ei},'sets',this.value)">
    <button class="btn-del-ex" style="width:26px;height:26px" onclick="deleteTmplEx(${ti},${ei})">−</button>
  </div>`;
}

function getET() { if (!_editingTemplates) _editingTemplates = getTemplates(); return _editingTemplates; }
function _et(ti,f,v)      { getET()[ti][f]=v; }
function _ete(ti,ei,f,v)  { getET()[ti].exercises[ei][f]=v; }

function addTmplEx(ti) {
  const t = getET()[ti];
  const newEx = { name:'', weight:'', reps:'', sets:'' };
  t.exercises.push(newEx);
  const ei = t.exercises.length - 1;
  const div = document.createElement('div');
  div.innerHTML = tmplExRowHTML(ti, ei, newEx);
  document.getElementById(`et-exrows-${ti}`).appendChild(div.firstElementChild);
}

function deleteTmplEx(ti, ei) {
  const tmpls = getET();
  tmpls[ti].exercises.splice(ei, 1);
  const snap = JSON.parse(JSON.stringify(tmpls));
  renderTemplates();
  _editingTemplates = snap;
}

function deleteTmpl(ti) {
  if (!confirm('Delete this template?')) return;
  getET().splice(ti, 1);
  saveTemplates(true);
}

function addNewTemplate() {
  getET().push({ id:'tmpl_'+Date.now(), name:'New Template', type:'other', icon:'📋', cardio:'', exercises:[{name:'',weight:'',reps:'',sets:''}] });
  saveTemplates(true);
}

function saveTemplates(silent) {
  localStorage.setItem(TMPL_STORE, JSON.stringify(getET()));
  _editingTemplates = null;
  renderTemplates();
  if (!silent) toast('Templates saved');
}

// ── STATS ──
function updateHeaderStats() {
  const data = getData();
  document.getElementById('hdr-count').textContent = data.length;
  const weekStart = new Date(); weekStart.setDate(weekStart.getDate() - weekStart.getDay() + 1); weekStart.setHours(0,0,0,0);
  document.getElementById('hdr-week').textContent = data.filter(s => new Date(s.date) >= weekStart).length;
  const dates = [...new Set(data.map(s=>s.date))].sort().reverse();
  let streak = 0, check = new Date(); check.setHours(0,0,0,0);
  for (const d of dates) {
    const sd = new Date(d); sd.setHours(0,0,0,0);
    if ((check - sd) / 86400000 <= 1) { streak++; check = sd; } else break;
  }
  document.getElementById('hdr-streak').textContent = streak;
}

// ── EXPORT / IMPORT ──
function exportData() {
  const blob = new Blob([JSON.stringify({ version:1, exported:new Date().toISOString(), sessions:getData() },null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `workout-log-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  toast('Exported');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      const sessions = parsed.sessions || parsed;
      if (!Array.isArray(sessions)) throw new Error();
      const existing = getData();
      const ids = new Set(existing.map(s=>s.id));
      const merged = [...existing, ...sessions.filter(s=>!ids.has(s.id))];
      merged.sort((a,b) => new Date(b.date) - new Date(a.date));
      saveData(merged);
      updateHeaderStats();
      toast(`Imported ${sessions.length} sessions`);
    } catch { toast('Import failed'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── MODAL ──
function showModal(title, msg, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal-bg').classList.add('open');
  modalCallback = cb;
  document.getElementById('modal-confirm').onclick = () => { closeModal(); if (modalCallback) modalCallback(); };
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// ── INIT ──
initForm();
updateHeaderStats();
</script>
